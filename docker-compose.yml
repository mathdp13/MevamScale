services:
  db:
    image: postgres:15
    container_name: mevam_scale_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: mevam_scale_api
    restart: always
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: mevam_scale_web
    restart: always
    ports:
      - "5173:5173"
    env_file: 
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata: